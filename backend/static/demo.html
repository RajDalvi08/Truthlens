<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens — AI Bias Detection</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .results {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .score-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--warning), var(--danger));
            border-radius: 4px;
            transition: width 1s ease-out;
        }
    </style>
</head>
<body>

    <h1>TruthLens</h1>
    <p class="subtitle">Real-time Media Bias Detection</p>

    <div class="container">
        <div class="form-group">
            <input type="text" id="url" placeholder="Paste a BBC, CNN, or Wikipedia article URL here" value="https://en.wikipedia.org/wiki/Fox_News">
            <button onclick="analyze()">Analyze Article</button>
        </div>

        <div id="loader" class="loader">
            Analyzing document with DistilBERT...
        </div>

        <div id="results" class="results">
            <div class="score-card">
                <div class="score-row">
                    <strong>Overall Bias Score</strong>
                    <strong id="total-score" style="color: var(--warning); font-size: 1.2rem;">0/100</strong>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="total-fill" style="width: 0%"></div></div>

                <div class="score-row">
                    <span style="color: var(--text-muted)">Linguistic Bias (40%)</span>
                    <span id="ling-score">0.00</span>
                </div>
                <div class="score-row">
                    <span style="color: var(--text-muted)">Framing Bias (35%)</span>
                    <span id="framing-score">0.00</span>
                </div>
                <div class="score-row">
                    <span style="color: var(--text-muted)">Entity Bias (25%)</span>
                    <span id="entity-score">0.00</span>
                </div>
            </div>
            
            <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5;">
                <strong>Preview:</strong> <span id="preview"></span>
            </p>
        </div>
    </div>

    <script>
        async function analyze() {
            const url = document.getElementById('url').value;
            if(!url) return;

            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:8000/analyze/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if(!response.ok) throw new Error(await response.text());

                const data = await response.json();
                
                // Update UI (API response is flat)
                document.getElementById('total-score').innerText = `${data.bias_score}/100 (${data.bias_level})`;
                document.getElementById('total-fill').style.width = `${data.bias_score}%`;
                
                document.getElementById('ling-score').innerText = data.linguistic_bias.toFixed(2);
                document.getElementById('framing-score').innerText = data.framing_bias.toFixed(2);
                document.getElementById('entity-score').innerText = data.entity_bias.toFixed(2);
                
                document.getElementById('preview').innerText = data.headline || "Analysis Complete";

                document.getElementById('loader').style.display = 'none';
                document.getElementById('results').style.display = 'block';

            } catch (err) {
                alert("Analysis failed: " + err);
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
